{% extends "base.html" %}
{% block content %}
<h4 class="fw-bold mb-3">{{ t('staff') }} (admin only)</h4>

<div class="card mb-3">
  <div class="card-header fw-bold">Create user</div>
  <div class="card-body">
    <form method="post">
      <div class="row g-2">
        <div class="col-md-4"><input class="form-control" name="username" placeholder="username" required></div>
        <div class="col-md-4"><input class="form-control" name="password" placeholder="password" required></div>
        <div class="col-md-4">
          <select class="form-select" name="role">
            <option value="staff">staff</option>
            <option value="manager">manager</option>
            <option value="admin">admin</option>
          </select>
        </div>
      </div>
      <button class="btn btn-success fw-bold w-100 mt-2">Create</button>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-header fw-bold">Users</div>
  <div class="card-body p-0">
    <table class="table table-bordered mb-0">
      <thead class="table-light"><tr><th>ID</th><th>Username</th><th>Role</th><th>Reset pass</th><th>Delete</th></tr></thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.username }}</td>
          <td>
            <form method="post" action="/staff/{{ u.id }}/role" class="d-flex gap-2">
              <select class="form-select form-select-sm" name="role">
                <option value="staff" {% if u.role=='staff' %}selected{% endif %}>staff</option>
                <option value="manager" {% if u.role=='manager' %}selected{% endif %}>manager</option>
                <option value="admin" {% if u.role=='admin' %}selected{% endif %}>admin</option>
              </select>
              <button class="btn btn-sm btn-warning fw-bold">Save</button>
            </form>
          </td>
          <td>
            <form method="post" action="/staff/{{ u.id }}/reset-pass" class="d-flex gap-2">
              <input class="form-control form-control-sm" name="password" placeholder="new password">
              <button class="btn btn-sm btn-outline-primary">Reset</button>
            </form>
          </td>
          <td>
            <a class="btn btn-sm btn-outline-danger" href="/staff/{{ u.id }}/delete" onclick="return confirm('Delete?')">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
